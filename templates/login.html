<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#F8FAFC;
    padding:20px;
}

.login-container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.login-container h2{
    text-align:center;
    color:#1E293B;
    font-size:30px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#64748B;
    font-size:14px;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:14px;
    font-weight:500;
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #CBD5E1;
    border-radius:10px;
    font-size:15px;
    background:#fff;
    transition:0.3s;
}

.form-control:focus{
    outline:none;
    border-color:#3B82F6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563EB;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.login-btn:hover{
    background:#1D4ED8;
}

.register{
    text-align:center;
    margin-top:22px;
    color:#64748B;
    font-size:14px;
}

.register a{
    color:#2563EB;
    text-decoration:none;
    font-weight:600;
}

.register a:hover{
    text-decoration:underline;
}

.error{
    text-align:center;
    color:#DC2626;
    margin-top:15px;
    font-size:14px;
}

</style>
</head>
<body>

<div class="login-container">

    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to continue</p>

    <form action="{% url 'login' %}" method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>
        </div>

        <button type="submit" class="login-btn">
            Sign In
        </button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="{% url 'register' %}">Create Account</a>
    </div>

    {% for msg in messages %}
        <p class="error">{{ msg }}</p>
    {% endfor %}

</div>

</body>
</html>
